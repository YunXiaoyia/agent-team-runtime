  <text x="1100" y="677" text-anchor="middle" opacity="1" class=""><tspan x="1100" dy="0" fill="#263238" font-weight="850" font-size="27">问题：方法论锁在 Cat Cafe 自己家，外部项目还是从零摸索</tspan></text>
  <text x="1100" y="722" text-anchor="middle" opacity="1" class=""><tspan x="1100" dy="0" fill="#7c3aed" font-weight="850" font-size="25">解法：猫猫驻场冷启动，和铲屎官一起做 AI native 改造，再把经验带回来</tspan></text>
  
