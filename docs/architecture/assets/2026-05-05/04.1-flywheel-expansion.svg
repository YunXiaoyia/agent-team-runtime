    <rect x="114" y="1088" width="392" height="44" rx="22" fill="#2563eb" opacity="0.96"/><text x="132" y="1118" font-size="25" font-weight="800" fill="white">F186 联：让所有知识互通</text>
  
  <text x="1100" y="1177" text-anchor="middle" opacity="1" class=""><tspan x="1100" dy="0" fill="#263238" font-weight="850" font-size="27">问题：回流经验散落在不同项目 / 方法论库里，猫开工时搜不到</tspan></text>
  <text x="1100" y="1222" text-anchor="middle" opacity="1" class=""><tspan x="1100" dy="0" fill="#2563eb" font-weight="850" font-size="25">解法：多域联邦检索，不统一存储，但统一发现和路由</tspan></text>
  
