  <text x="1100" y="70" text-anchor="middle" opacity="1" class="title"><tspan x="1100" dy="0" fill="#263238" font-weight="850" font-size="48">图 4.1：飞轮扩展 — 减 × 出 × 联</tspan></text>
  <text x="1100" y="112" text-anchor="middle" opacity="1" class=""><tspan x="1100" dy="0" fill="#667085" font-weight="600" font-size="24">F163 让知识能减；F152 让方法论能出去；F186 让跨域知识能联起来</tspan></text>

  
    <rect x="90" y="165" width="2020" height="335" rx="34" fill="#dcfce7" stroke="#16a34a" stroke-width="3" stroke-dasharray="" opacity="1" filter="url(#shadow)"/>
    <rect x="114" y="143" width="420" height="44" rx="22" fill="#16a34a" opacity="0.96"/><text x="132" y="173" font-size="25" font-weight="800" fill="white">F163 减：让知识能证明自己</text>
  
  <text x="1100" y="232" text-anchor="middle" opacity="1" class=""><tspan x="1100" dy="0" fill="#263238" font-weight="850" font-size="27">问题：知识只有“增”没有“减”，越积越噪，过期决策还会继续误导 agent</tspan></text>
  <text x="1100" y="277" text-anchor="middle" opacity="1" class=""><tspan x="1100" dy="0" fill="#16a34a" font-weight="850" font-size="25">解法：每条知识自带证明链，多维判断，不是一刀切</tspan></text>
  
    <rect x="170" y="320" width="430" height="112" rx="24" fill="white" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/>
    <text x="385" y="362" text-anchor="middle" opacity="1" class=""><tspan x="385" dy="0" fill="#16a34a" font-weight="900" font-size="25">authority</tspan></text>
    <text x="385" y="398" text-anchor="middle" opacity="1" class=""><tspan x="385" dy="0" fill="#667085" font-weight="760" font-size="19">谁说的？来源多可靠</tspan></text>
  
  
    <rect x="650" y="320" width="430" height="112" rx="24" fill="white" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/>
    <text x="865" y="362" text-anchor="middle" opacity="1" class=""><tspan x="865" dy="0" fill="#16a34a" font-weight="900" font-size="25">activation</tspan></text>
    <text x="865" y="398" text-anchor="middle" opacity="1" class=""><tspan x="865" dy="0" fill="#667085" font-weight="760" font-size="19">最近还被引用吗</tspan></text>
  
  
    <rect x="1130" y="320" width="430" height="112" rx="24" fill="white" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/>
    <text x="1345" y="362" text-anchor="middle" opacity="1" class=""><tspan x="1345" dy="0" fill="#16a34a" font-weight="900" font-size="25">criticality</tspan></text>
    <text x="1345" y="398" text-anchor="middle" opacity="1" class=""><tspan x="1345" dy="0" fill="#667085" font-weight="760" font-size="19">多重要，错了多危险</tspan></text>
  
  
    <rect x="1610" y="320" width="430" height="112" rx="24" fill="white" stroke="#16a34a" stroke-width="3" filter="url(#shadow)"/>
    <text x="1825" y="362" text-anchor="middle" opacity="1" class=""><tspan x="1825" dy="0" fill="#16a34a" font-weight="900" font-size="25">verify_date</tspan></text>
    <text x="1825" y="398" text-anchor="middle" opacity="1" class=""><tspan x="1825" dy="0" fill="#667085" font-weight="760" font-size="19">多久没验证，过期了吗</tspan></text>
  
  <text x="1100" y="472" text-anchor="middle" opacity="1" class=""><tspan x="1100" dy="0" fill="#16a34a" font-weight="850" font-size="24">效果：高权威但过期 ≠ 低权威但活跃；为图 4 左轮的 stale detect / contradiction flag 提供工程实现</tspan></text>

  <line x1="1100" y1="520" x2="1100" y2="585" stroke="#344054" stroke-width="5"  stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="940" y="540" width="320" height="44" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1100" y="570.16" text-anchor="middle" font-size="24" font-weight="700" fill="#16a34a">知识质量有保障</text>

  
