  <text x="150" y="1744" font-size="24" font-weight="850" fill="#24313a">图例与口径：</text>
  <text x="350" y="1744" font-size="23" font-weight="700" fill="#24313a">OAI = OpenAI harness engineering；ANT = Anthropic long-running / managed agents；FOW = Fowler / Thoughtworks guides + sensors。</text>
  <text x="150" y="1788" font-size="23" font-weight="700" fill="#dc2626">这些不是官方一一对应分类；是为了把中文社区六大件映射回各家具体问题域。</text>
