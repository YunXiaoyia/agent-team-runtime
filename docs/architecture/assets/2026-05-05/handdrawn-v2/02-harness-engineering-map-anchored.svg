  <text x="1340" y="1388" text-anchor="start" font-size="28" font-weight="720" fill="#24313a"><tspan x="1340" dy="0">它定义的是多 agent 之间“球权”如何真实迁移。</tspan><tspan x="1340" dy="35.84">纯文字声明不算状态迁移；必须有 tool call / commit / verdict / hold_ball 等现实动作。</tspan><tspan x="1340" dy="35.84">外部六大件覆盖 agent harness 底座，但不完整覆盖 multi-agent collaboration harness。</tspan></text>
